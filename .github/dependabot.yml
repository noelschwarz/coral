version: 2
updates:
  # Python deps for the daemon (managed via uv / pyproject.toml).
  # Dependabot reads PEP 621 dependencies from pyproject.toml using the
  # "pip" ecosystem. uv.lock isn't auto-updated; Dependabot proposes the
  # bumps and we re-resolve locally with `uv lock`.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # npm deps for the Chrome extension build pipeline.
  - package-ecosystem: "npm"
    directory: "/extension"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "extension"
    commit-message:
      prefix: "deps(extension)"
      include: "scope"
    groups:
      extension-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used in CI workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "deps(ci)"
      include: "scope"
