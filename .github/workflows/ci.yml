name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  python:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install SQLCipher headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsqlcipher-dev
      - name: Install SQLCipher headers (macOS)
        if: runner.os == 'macOS'
        run: brew install sqlcipher
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync
        run: uv sync --all-extras
      - name: Install Playwright Chromium (cached on rerun)
        run: uv run playwright install chromium --with-deps
      - name: Lint + typecheck + tests
        run: |
          uv run ruff check coral tests
          uv run ruff format --check coral tests
          uv run pyright
          uv run pytest --cov=coral

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - name: Lint, typecheck, build
        working-directory: extension
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm run build
