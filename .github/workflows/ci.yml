name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SQLCipher (headers for sqlcipher3 source builds)
        run: sudo apt-get update && sudo apt-get install -y libsqlcipher-dev
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync + lint + typecheck + tests
        run: |
          uv sync --all-extras
          uv run ruff check coral tests
          uv run ruff format --check coral tests
          uv run pyright
          uv run pytest

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - name: Lint, typecheck, build
        working-directory: extension
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm run build
